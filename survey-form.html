<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title">Recipe Blog Survey Form</h1>
    <p id="description">Please help us understand how can we improve our Blog and thank you for your time.</p>
    <form id="survey-form">
      <fieldset>
      <legend>Personal Information</legend>
      <label for="name" id="name-label">Name</label>
      <input required id="name" type="text" placeholder="Enter your name here">
      <label for="email" id="email-label"><br>Email</label>
      <input required id="email" type="email" placeholder="Enter your email here">
      <label for="number" id="number-label"><br>Age (optional):</label>
      <input id="number" type="number" min="1" max="3" placeholder="Age">
      </fieldset>
      <fieldset>
      <legend>Feedback</legend>
      <label for="dropdown" id="recipe-label">How was the recipe?</label>
      <select id="dropdown">
        <option value="poor">Poor</option>
        <option value="satisfactory">Satisfactory</option>
        <option value="good">Good</option>
        <option value="very-good">Very Good</option>
        <option selected value="excellent">Excellent</option>
      </select>
      <label for="recipe"><br>Would you recommend this recipe to a friend?</label>
      <input id="yes-option" type="radio" name="recipe" value="yes" />
      <label for="yes-option">Yes</label>
      <input id="no-option" type="radio" name="recipe" value="no" />
      <label for="no-option">No</label>
      <label for="further"><br>What further recipes would you like to be emailed?<br></label>
      <input type="checkbox" id="c-cake" name="choice" value="c-cake" />
      <label for="c-cake">Chocolate Cake</label>
      <input type="checkbox" id="s-cake" name="choice" value="s-cake" />
      <label for="s-cake">Strawberry Cake</label>
      <input type="checkbox" id="p-cake" name="choice" value="p-cake" />
      <label for="p-cake">Pineapple Cake</label>
      </fieldset>
      <label for="comments">Other Comments?<br></label>
      <textarea cols="30" rows="10" name="comments" id="comments"></textarea>
      <button id="submit">Submit</button>
    </form>
  </body>
</html>
